<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/padel-logo-192.png" />
    <!-- VITAL FOR iOS/PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sabardes">
    <!-- END VITAL -->
    <meta name="theme-color" content="#0f172a" />
    <title>Padel Sabardes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration for push -->
    <script>
      if ('serviceWorker' in navigator) {
         window.addEventListener('load', () => {
           navigator.serviceWorker.register('/firebase-messaging-sw.js').then((registration) => {
             console.log('Firebase Service Worker registered:', registration.scope);
           }).catch((err) => {
             console.log('Firebase Service Worker registration failed:', err);
           });
         });
      }
    </script>
  </body>
</html>
